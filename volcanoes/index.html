<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volcano and Landslide Monitor</title>
  <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/dashboard.css" />
  <style>
    html, body { height: 100%; }
    body { overflow: hidden; }
    #map { position: fixed; inset: 0; }
    .overlay { position: absolute; top: 16px; left: 16px; z-index: 3; width: min(430px, calc(100vw - 32px)); }
    .overlay .panel { margin-bottom: 12px; }
    .legend { position: absolute; left: 16px; bottom: 16px; z-index: 3; width: min(320px, calc(100vw - 32px)); }
    .map-card { background: rgba(10, 18, 28, 0.9); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28); backdrop-filter: blur(14px); color: var(--text); }
    .map-card .body { padding: 14px 16px 16px; }
    .map-card h1 { font-size: 19px; line-height: 1.15; margin: 0; }
    .map-card p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
    .stat { padding: 8px; border-radius: 12px; background: rgba(255,255,255,0.06); text-align: center; }
    .stat strong { display: block; font-size: 16px; }
    .stat span { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }
    .control-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .legend-list { display: grid; gap: 8px; margin-top: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
    .swatch { width: 14px; height: 14px; border-radius: 999px; flex: none; }
    @media (max-width: 720px) {
      .overlay, .legend { left: 12px; width: calc(100vw - 24px); }
      .legend { bottom: 12px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body data-source-ids="nasa-eonet-volcanoes,nasa-eonet-landslides" data-page-title="Volcano and Landslide Monitor" data-explorer-query="?type=natural_hazard&subtype=volcano">
  <div id="map"></div>

  <div class="overlay">
    <section class="map-card">
      <div class="body">
        <a class="chip-link" href="../">&larr; Dashboard home</a>
        <a class="chip-link" href="../events/?type=natural_hazard&subtype=volcano" style="margin-left:6px;">Event Explorer</a>
        <h1 id="mapTitle" style="margin-top:12px;">Volcano and Landslide Monitor</h1>
        <p id="mapDescription">Live volcano and landslide source records from NASA EONET.</p>

        <div class="stats-row">
          <div class="stat"><strong id="sourceCount">0</strong><span>sources</span></div>
          <div class="stat"><strong id="featureCount">0</strong><span>events</span></div>
          <div class="stat"><strong id="updatedAt">loading</strong><span>last update</span></div>
          <div class="stat"><strong id="statusLabel">loading</strong><span>status</span></div>
        </div>

        <div class="control-strip">
          <a class="button primary" id="explorerLink" href="../events/?type=natural_hazard&subtype=volcano">Open filtered explorer</a>
          <button class="button" id="refreshButton" type="button">Refresh</button>
        </div>

        <div id="statusText" class="muted" style="margin-top:10px; font-size:12px;">Loading live layers…</div>
      </div>
    </section>
  </div>

  <section class="legend">
    <div class="map-card">
      <div class="body">
        <strong>Geologic hazard layers</strong>
        <div class="legend-list" id="legendList"></div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
  <script src="../assets/dashboard-core.js"></script>
  <script src="./app.js"></script>
</body>
</html>
