name: Update wildfire data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fires:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch NASA FIRMS data
        env:
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
        run: python scripts/update_fires.py

      - name: Commit updated wildfire snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wildfires/data
          if git diff --cached --quiet; then
            echo "No wildfire data changes to commit."
            exit 0
          fi
          git commit -m "Update wildfire data"
          git push
