name: Update compact event cache

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate compact cache
        run: python scripts/update_compact_cache.py

      - name: Commit compact cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update compact event cache
          file_pattern: data/compact-events.json data/source-status.json
